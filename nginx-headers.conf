# Security & SEO response headers for Go Club Zürich
# Usage: add  include /path/to/nginx-headers.conf;  inside your server{} block.
#
# Notes:
#   HSTS: once deployed with a valid TLS cert, the preload directive lets you
#         submit the domain to the browser preload lists (hstspreload.org).
#
#   CSP:  style-src 'unsafe-inline' is required because the active-nav highlight
#         uses inline style="text-decoration: underline;" (see site/snippets/nav.php).
#         To tighten this, replace those inline styles with a CSS class and drop
#         'unsafe-inline' from style-src.
#
#         script-src 'self' covers all external .js files.
#         JSON-LD <script type="application/ld+json"> is a data block and is
#         explicitly exempt from script-src per the CSP spec.
#
#   form-action 'self' prevents CSRF-style form hijacking to external origins.
#   frame-ancestors 'none' supersedes X-Frame-Options but both are sent for
#   compatibility with older browsers.

add_header Strict-Transport-Security  "max-age=31536000; includeSubDomains; preload" always;
add_header X-Frame-Options            "SAMEORIGIN"                                   always;
add_header X-Content-Type-Options     "nosniff"                                      always;
add_header Referrer-Policy            "strict-origin-when-cross-origin"              always;
add_header Permissions-Policy         "camera=(), microphone=(), geolocation=()"     always;
add_header Content-Security-Policy    "default-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self'; script-src 'self'; img-src 'self' data:; form-action 'self'; frame-ancestors 'none'; base-uri 'self';" always;
