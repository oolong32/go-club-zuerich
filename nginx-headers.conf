# Security & SEO response headers for Go Club Zürich
# Usage: add  include /path/to/nginx-headers.conf;  inside your server{} block.
#
# Notes:
#   HSTS: once deployed with a valid TLS cert, the preload directive lets you
#         submit the domain to the browser preload lists (hstspreload.org).
#
#   CSP:  All fonts are self-hosted (assets/fonts/); font-src 'self' is sufficient
#         and no external font CDNs are needed.
#
#         All inline style= attributes have been replaced with CSS classes.
#         'unsafe-inline' is no longer needed in style-src.
#
#         script-src 'self' covers all JS files served from this origin.
#         JSON-LD <script type="application/ld+json"> is a data block and is
#         explicitly exempt from script-src per the CSP spec.
#
#   form-action 'self' prevents CSRF-style form hijacking to external origins.
#   frame-ancestors 'none' supersedes X-Frame-Options but both are sent for
#   compatibility with older browsers.

add_header Strict-Transport-Security  "max-age=31536000; includeSubDomains; preload" always;
add_header X-Frame-Options            "SAMEORIGIN"                                   always;
add_header X-Content-Type-Options     "nosniff"                                      always;
add_header Referrer-Policy            "strict-origin-when-cross-origin"              always;
add_header Permissions-Policy         "camera=(), microphone=(), geolocation=()"     always;
add_header Content-Security-Policy    "default-src 'self'; style-src 'self'; font-src 'self'; script-src 'self'; img-src 'self' data:; form-action 'self'; frame-ancestors 'none'; base-uri 'self';" always;
